name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important for tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix ui-src

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ✅ bump version WITHOUT committing
      - name: Bump version (no commit)
        run: |
          npm version patch --no-git-tag-version

      # ✅ get version
      - name: Get version
        id: version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      # ✅ check if tag already exists remotely
      - name: Create and push tag (safe)
        run: |
          if git ls-remote --tags origin | grep "refs/tags/v${VERSION}" >/dev/null; then
            echo "Tag v${VERSION} already exists. Skipping tag push."
          else
            git tag v${VERSION}
            git push origin v${VERSION}
          fi

      # ✅ publish only if not already published
      - name: Publish to npm (safe)
        run: |
          PUBLISHED=$(npm view your-package-name version || echo "0.0.0")

          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Version already published. Skipping npm publish."
            exit 0
          fi

          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
